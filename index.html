<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food App</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ═══════════════ PHONE FRAME ═══════════════ -->
<div class="phone-wrapper">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="none"><path d="M1 6s4.5-5 11-5 11 5 11 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4.5 9.5s2.5-3 7.5-3 7.5 3 7.5 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="14" r="2" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="6" width="4" height="12" rx="1"/><rect x="7" y="4" width="4" height="14" rx="1"/><rect x="13" y="2" width="4" height="16" rx="1"/><rect x="19" y="1" width="4" height="17" rx="1" opacity="0.3"/></svg>
      <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M20 10h2v5h-2" stroke="currentColor" stroke-width="2"/><rect x="5" y="10" width="10" height="5" rx="1" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- ═══ SCREEN: HOME ═══ -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div class="hamburger">
        <span></span><span></span><span></span>
      </div>
      <button class="cart-icon-btn" id="cart-icon-home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="3" y1="6" x2="21" y2="6" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 10a4 4 0 01-8 0" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="cart-badge" style="display:none;">0</span>
      </button>
    </div>
    <div id="categories-list" class="categories-list"></div>
    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <button class="nav-btn active" id="nav-home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" id="nav-search">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">Search</span>
      </button>
      <button class="nav-btn" id="nav-cart">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Cart</span>
        <span class="cart-badge" style="display:none; position:absolute; top:0; right:6px; width:16px; height:16px; font-size:9px;">0</span>
      </button>
      <button class="nav-btn" id="nav-profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </div>
  </div>

  <!-- ═══ SCREEN: MENU ═══ -->
  <div id="screen-menu" class="screen">
    <div class="menu-header">
      <div class="menu-header-top">
        <button class="btn-back" id="btn-back-menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 5l-7 7 7 7" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="menu-title" class="menu-title">Salads menu</div>
        <button class="cart-icon-btn" id="cart-icon-menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="#1A1A2E" stroke-width="2"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="cart-badge" style="display:none;">0</span>
        </button>
      </div>
    </div>
    <div style="overflow-y:auto; flex:1;">
      <div id="products-list" class="products-list"></div>
    </div>
  </div>

  <!-- ═══ SCREEN: DETAIL ═══ -->
  <div id="screen-detail" class="screen">
    <div class="detail-header">
      <button class="btn-back" id="btn-back-detail">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div style="flex:1;"></div>
      <button class="cart-icon-btn" id="cart-icon-detail">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
          <line x1="3" y1="6" x2="21" y2="6" stroke="#1A1A2E" stroke-width="2"/>
          <path d="M16 10a4 4 0 01-8 0" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="cart-badge" style="display:none;">0</span>
      </button>
    </div>

    <div class="detail-content" style="overflow-y:auto; flex:1;">
      <div id="detail-img" class="detail-img">🥗</div>
      <div id="detail-name" class="detail-name">Product name</div>
      <div class="detail-meta">
        <div id="detail-stars" class="detail-stars"></div>
        <div id="detail-weight" class="detail-weight">250g</div>
        <div id="detail-price" class="detail-price">0.00 $</div>
      </div>
      <p id="detail-desc" class="detail-desc"></p>
      <div class="detail-add-row">
        <div style="font-size:13px; color:var(--text-light);">Quantity: 1</div>
        <button class="btn-add-detail" id="btn-add-detail">
          <span>Add to cart</span>
          <span>+</span>
        </button>
      </div>
    </div>

    <!-- Peek next -->
    <div id="peek-next" class="peek-next">
      <div id="peek-img" class="peek-img">🥗</div>
      <div class="peek-info">
        <div id="peek-name" class="peek-name">Next item</div>
        <div id="peek-rating" class="peek-rating"></div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 18l6-6-6-6" stroke="#9898A8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- ═══ SCREEN: CART ═══ -->
  <div id="screen-cart" class="screen">
    <div class="cart-header">
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="btn-back" id="btn-back-cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 5l-7 7 7 7" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="cart-title">Shopping<br>cart</div>
      </div>
    </div>
    <div style="overflow-y:auto; flex:1;">
      <div id="cart-items" class="cart-items"></div>

      <div id="cart-summary-wrap" class="cart-summary-wrap" style="display:none;">
        <div class="cart-summary-toggle">
          <span class="cart-summary-title">Shopping Cart Summary</span>
          <span class="summary-arrow">˄</span>
        </div>
        <div id="summary-body" class="cart-summary-body open">
          <div class="summary-row">
            <span>Number of items:</span>
            <span class="val" id="summary-items">0</span>
          </div>
          <div class="summary-row">
            <span>Subtotal:</span>
            <span class="val" id="summary-subtotal">0.00 $</span>
          </div>
          <div class="summary-row">
            <span>Tax:</span>
            <span class="val" id="summary-tax">1.00 $</span>
          </div>
          <div class="summary-row total-row">
            <span>Total:</span>
            <span class="val" id="summary-total">0.00 $</span>
          </div>
          <button class="btn-checkout" id="btn-checkout">Checkout</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- end phone-wrapper -->

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
